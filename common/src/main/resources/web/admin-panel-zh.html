<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>AuthPlugin 管理中台</title>
  <style>
    :root {
      --bg: #eef3ff;
      --surface: #ffffff;
      --surface-2: #f7f9ff;
      --text: #132038;
      --muted: #5f6f8c;
      --line: #d8e1f3;
      --brand: #1f6feb;
      --brand-hover: #1359c1;
      --danger: #d84a4a;
      --danger-hover: #b83535;
      --success: #1f7a41;
      --success-bg: #e7f8ed;
      --warn: #9f2b2b;
      --warn-bg: #fdeaea;
      --shadow: 0 12px 28px rgba(24, 41, 71, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      color: var(--text);
      background: radial-gradient(circle at 15% 0%, #dce7ff 0%, #eef3ff 42%);
    }

    .app-shell {
      width: min(90vw, 1800px);
      margin: 20px auto;
      display: grid;
      grid-template-columns: 240px 1fr;
      gap: 14px;
      min-height: calc(100vh - 40px);
    }

    .panel {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 14px;
      box-shadow: var(--shadow);
    }

    .hidden {
      display: none !important;
    }

    .login-wrap {
      width: min(460px, calc(100vw - 32px));
      margin: 10vh auto;
      padding: 22px;
    }

    .login-title {
      margin: 0;
      font-size: 30px;
      line-height: 1.2;
    }

    .sub {
      color: var(--muted);
      margin-top: 8px;
      line-height: 1.5;
    }

    .form-group {
      margin-top: 14px;
      display: grid;
      gap: 6px;
    }

    label {
      font-size: 14px;
      font-weight: 700;
    }

    input,
    select {
      width: 100%;
      border: 1px solid var(--line);
      background: #fff;
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 14px;
      color: var(--text);
    }

    button {
      border: none;
      border-radius: 10px;
      padding: 9px 13px;
      font-weight: 700;
      cursor: pointer;
    }

    button.primary {
      background: var(--brand);
      color: #fff;
    }

    button.primary:hover {
      background: var(--brand-hover);
    }

    button.ghost {
      background: #e9f0ff;
      color: #244471;
    }

    button.ghost:hover {
      background: #dce7ff;
    }

    button.danger {
      background: var(--danger);
      color: #fff;
    }

    button.danger:hover {
      background: var(--danger-hover);
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .status {
      min-height: 22px;
      margin-top: 12px;
      font-weight: 700;
      font-size: 14px;
    }

    .status.ok {
      color: var(--success);
    }

    .status.err {
      color: var(--warn);
    }

    .sidebar {
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .brand {
      margin-bottom: 6px;
    }

    .brand h1 {
      margin: 0;
      font-size: 20px;
    }

    .brand p {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
    }

    .menu-btn {
      text-align: left;
      padding: 10px 12px;
      border-radius: 10px;
      background: transparent;
      color: #274067;
      border: 1px solid transparent;
    }

    .menu-btn.active {
      background: #e8efff;
      border-color: #c8d9ff;
      color: #173868;
    }

    .sidebar-meta {
      margin-top: auto;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.5;
      border-top: 1px solid var(--line);
      padding-top: 10px;
    }

    .content {
      padding: 14px;
      display: grid;
      grid-template-rows: auto 1fr;
      gap: 12px;
    }

    .topbar {
      padding: 14px;
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
    }

    .topbar h2 {
      margin: 0;
      font-size: 22px;
    }

    .topbar .meta {
      margin-top: 6px;
      color: var(--muted);
      font-size: 13px;
    }

    .row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }

    .page {
      padding: 14px;
    }

    .title-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      justify-content: flex-end;
    }

    .title-block {
      display: grid;
      gap: 8px;
    }

    .token-generate-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(3, minmax(180px, 1fr));
      gap: 10px;
    }

    .card {
      border: 1px solid var(--line);
      border-radius: 12px;
      background: var(--surface-2);
      padding: 12px;
    }

    .card-title {
      margin: 0;
      font-size: 13px;
      color: var(--muted);
    }

    .card-value {
      margin: 6px 0 0;
      font-size: 26px;
      font-weight: 800;
    }

    .inline-panel {
      margin-top: 12px;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 12px;
      background: #fff;
    }

    .inline-panel h3 {
      margin: 0;
      font-size: 16px;
    }

    .chips {
      margin-top: 10px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .chip {
      border: 1px solid #c7d8fd;
      background: #e8efff;
      border-radius: 999px;
      padding: 4px 10px;
      font-size: 12px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    }

    .table-wrap {
      margin-top: 10px;
      overflow: auto;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #fff;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 920px;
      font-size: 14px;
    }

    th,
    td {
      border-bottom: 1px solid var(--line);
      text-align: left;
      padding: 9px 10px;
      vertical-align: top;
    }

    th {
      color: var(--muted);
      font-weight: 700;
      background: #f7faff;
    }

    tbody tr:last-child td {
      border-bottom: none;
    }

    .tag {
      display: inline-block;
      border-radius: 999px;
      padding: 2px 8px;
      font-size: 12px;
      font-weight: 800;
    }

    .tag.active {
      color: var(--success);
      background: var(--success-bg);
    }

    .tag.disabled {
      color: var(--warn);
      background: var(--warn-bg);
    }

    .actions {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .pagination {
      margin-top: 10px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      flex-wrap: wrap;
    }

    .muted {
      color: var(--muted);
      font-size: 13px;
    }

    .empty {
      margin-top: 10px;
      color: var(--muted);
    }

    .mono {
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 12px;
    }

    .log-lines {
      margin: 10px 0 0;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #0f1728;
      color: #d6e2ff;
      padding: 10px;
      max-height: 360px;
      overflow: auto;
      white-space: pre-wrap;
      word-break: break-word;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 12px;
      line-height: 1.4;
    }

    @media (max-width: 1080px) {
      .app-shell {
        grid-template-columns: 1fr;
      }

      .sidebar {
        gap: 6px;
      }

      .cards {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
<div id="loginView" class="panel login-wrap">
  <h1 class="login-title">AuthPlugin 管理中台</h1>

  <div class="form-group">
    <label for="loginUsername">用户名</label>
    <input id="loginUsername" type="text" autocomplete="username" placeholder="请输入用户名" />
  </div>
  <div class="form-group">
    <label for="loginPassword">密码</label>
    <input id="loginPassword" type="password" autocomplete="current-password" placeholder="请输入密码" />
  </div>
  <div class="row" style="margin-top: 14px;">
    <button id="loginBtn" class="primary">登录</button>
  </div>
  <div id="loginStatus" class="status"></div>
</div>

<div id="appView" class="app-shell hidden">
  <aside class="panel sidebar">
    <div class="brand">
      <h1>AuthPlugin</h1>
    </div>

    <button class="menu-btn active" data-page="overview">概览</button>
    <button class="menu-btn" data-page="players">在线玩家</button>
    <button class="menu-btn" data-page="tokens">Token 管理</button>
    <button class="menu-btn" data-page="server">服务器控制</button>

    <div class="sidebar-meta">
      <div id="tokenExpireInfo">会话状态：未登录</div>
      <div id="lastRefreshInfo">上次刷新：-</div>
    </div>
  </aside>

  <main class="content panel">
    <section class="topbar panel" style="box-shadow: none; margin: 0;">
      <div class="title-block">
        <h2 id="pageTitle">概览</h2>
        <div id="tokenTitleGenerate" class="token-generate-row hidden">
          <span class="muted">批量生成（1-__MAX_BATCH_COUNT__）</span>
          <input id="generateCount" type="number" min="1" max="__MAX_BATCH_COUNT__" value="10" style="max-width: 140px;" />
          <button id="generateBtn" class="primary">生成</button>
        </div>
      </div>
      <div class="title-actions">
        <button id="refreshNowBtn" class="ghost">立即刷新</button>
        <button id="logoutBtn" class="danger">退出登录</button>
      </div>
      <div id="globalStatus" class="status" style="width: 100%;"></div>
    </section>

    <section id="page-overview" class="page">
      <div class="cards">
        <div class="card">
          <p class="card-title">在线玩家</p>
          <p class="card-value" id="overviewOnlineCount">0</p>
        </div>
        <div class="card">
          <p class="card-title">Token 总数</p>
          <p class="card-value" id="overviewTokenCount">0</p>
        </div>
        <div class="card">
          <p class="card-title">已禁用 Token</p>
          <p class="card-value" id="overviewDisabledCount">0</p>
        </div>
      </div>
    </section>

    <section id="page-players" class="page hidden">
      <div class="row" style="justify-content: space-between;">
        <strong>在线玩家列表</strong>
        <span id="playersCount" class="muted">共 0 人</span>
      </div>

      <div class="table-wrap" id="playersWrap"></div>
      <div class="pagination">
        <div class="row" style="gap: 6px;">
          <button id="playersPrevBtn" class="ghost">上一页</button>
          <button id="playersNextBtn" class="ghost">下一页</button>
          <span id="playersPageInfo" class="muted">第 1 / 1 页</span>
        </div>
        <div class="row" style="gap: 6px;">
          <label for="playersPageSize" class="muted">每页</label>
          <select id="playersPageSize" style="width: 90px;">
            <option value="10">10</option>
            <option value="20" selected>20</option>
            <option value="50">50</option>
          </select>
        </div>
      </div>
    </section>

    <section id="page-tokens" class="page hidden">
      <div class="row" style="justify-content: space-between;">
        <div class="row" style="gap: 10px;">
          <strong>Token 列表</strong>
          <span id="tokensCount" class="muted">共 0 条</span>
        </div>
      </div>
      <div id="generatedTokens" class="chips"></div>

      <div class="table-wrap" id="tokensWrap"></div>
      <div class="pagination">
        <div class="row" style="gap: 6px;">
          <button id="tokensPrevBtn" class="ghost">上一页</button>
          <button id="tokensNextBtn" class="ghost">下一页</button>
          <span id="tokensPageInfo" class="muted">第 1 / 1 页</span>
        </div>
        <div class="row" style="gap: 6px;">
          <label for="tokensPageSize" class="muted">每页</label>
          <select id="tokensPageSize" style="width: 90px;">
            <option value="10">10</option>
            <option value="20" selected>20</option>
            <option value="50">50</option>
          </select>
        </div>
      </div>
    </section>

    <section id="page-server" class="page hidden">
      <div class="cards">
        <div class="card">
          <p class="card-title">服务器状态</p>
          <p class="card-value" id="serverRunningValue">-</p>
        </div>
        <div class="card">
          <p class="card-title">在线人数</p>
          <p class="card-value" id="serverLoadValue">-</p>
        </div>
        <div class="card">
          <p class="card-title">StopMsgMod</p>
          <p class="card-value" id="serverStopMsgValue">-</p>
        </div>
      </div>

      <div class="inline-panel">
        <div class="row" style="justify-content: space-between;">
          <strong>控制台指令</strong>
          <span id="serverUptimeInfo" class="muted">运行时长：-</span>
        </div>
        <div class="row" style="margin-top: 8px;">
          <input id="serverCommandInput" type="text" placeholder="例如：say 服务器维护通知" style="min-width: 320px; flex: 1;" />
          <button id="serverCommandBtn" class="primary">执行指令</button>
        </div>
        <div id="serverCommandResult" class="muted" style="margin-top: 8px;"></div>
      </div>

      <div class="inline-panel">
        <div class="row" style="justify-content: space-between;">
          <strong>关服维护</strong>
        </div>
        <div class="row" style="margin-top: 8px;">
          <input id="shutdownMessageInput" type="text" placeholder="关服通知（可选，支持 StopMsgMod）" style="min-width: 320px; flex: 1;" />
          <button id="shutdownBtn" class="danger">关闭服务器</button>
        </div>
      </div>

      <div class="inline-panel">
        <div class="row" style="justify-content: space-between;">
          <strong>服务器日志</strong>
          <div class="row">
            <label for="serverLogLimit" class="muted">显示行数</label>
            <select id="serverLogLimit" style="width: 100px;">
              <option value="100">100</option>
              <option value="200" selected>200</option>
              <option value="500">500</option>
              <option value="1000">1000</option>
            </select>
            <button id="refreshLogsBtn" class="ghost">刷新日志</button>
          </div>
        </div>
        <pre id="serverLogLines" class="log-lines"></pre>
      </div>
    </section>
  </main>
</div>

<script>
  const MAX_BATCH_COUNT = __MAX_BATCH_COUNT__;
  const TOKEN_STORAGE_KEY = 'authplugin_access_token';
  const TOKEN_EXPIRE_STORAGE_KEY = 'authplugin_access_token_expires_at';
  const POLL_INTERVAL_MS = 5000;

  const state = {
    currentPage: 'overview',
    players: [],
    tokens: [],
    serverStatus: null,
    serverLogs: [],
    serverLogLimit: 200,
    generatedTokens: [],
    playersPage: 1,
    tokensPage: 1,
    playersPageSize: 20,
    tokensPageSize: 20,
    accessToken: '',
    expiresAt: 0,
    pollTimer: null,
    refreshInFlight: false,
    generateInFlight: false,
    serverCommandInFlight: false,
    shutdownInFlight: false
  };

  const loginViewEl = document.getElementById('loginView');
  const appViewEl = document.getElementById('appView');
  const loginStatusEl = document.getElementById('loginStatus');
  const globalStatusEl = document.getElementById('globalStatus');
  const tokenExpireInfoEl = document.getElementById('tokenExpireInfo');
  const lastRefreshInfoEl = document.getElementById('lastRefreshInfo');
  const generatedTokensEl = document.getElementById('generatedTokens');

  function escapeHtml(value) {
    return String(value)
      .replaceAll('&', '&amp;')
      .replaceAll('<', '&lt;')
      .replaceAll('>', '&gt;')
      .replaceAll('"', '&quot;')
      .replaceAll("'", '&#39;');
  }

  function setStatus(targetEl, message, isError) {
    targetEl.textContent = message || '';
    targetEl.className = 'status ' + (isError ? 'err' : 'ok');
  }

  function setGlobalStatus(message, isError = false) {
    setStatus(globalStatusEl, message, isError);
  }

  function setLoginStatus(message, isError = false) {
    setStatus(loginStatusEl, message, isError);
  }

  function formatTime(timestamp) {
    if (!timestamp) {
      return '-';
    }
    const date = new Date(timestamp);
    if (Number.isNaN(date.getTime())) {
      return '-';
    }
    return date.toLocaleString();
  }

  function saveAuthState(accessToken, expiresAt) {
    state.accessToken = accessToken || '';
    state.expiresAt = Number.isFinite(expiresAt) ? expiresAt : 0;
    if (state.accessToken) {
      localStorage.setItem(TOKEN_STORAGE_KEY, state.accessToken);
      localStorage.setItem(TOKEN_EXPIRE_STORAGE_KEY, String(state.expiresAt));
    } else {
      localStorage.removeItem(TOKEN_STORAGE_KEY);
      localStorage.removeItem(TOKEN_EXPIRE_STORAGE_KEY);
    }
    updateSessionMeta();
  }

  function clearAuthState() {
    saveAuthState('', 0);
    stopPolling();
  }

  function restoreAuthState() {
    const accessToken = localStorage.getItem(TOKEN_STORAGE_KEY) || '';
    const expiresAt = Number.parseInt(localStorage.getItem(TOKEN_EXPIRE_STORAGE_KEY) || '0', 10);
    saveAuthState(accessToken, Number.isFinite(expiresAt) ? expiresAt : 0);
  }

  function hasUsableAccessToken() {
    if (!state.accessToken) {
      return false;
    }
    return Date.now() < state.expiresAt;
  }

  function updateSessionMeta() {
    if (hasUsableAccessToken()) {
      tokenExpireInfoEl.textContent = '会话到期：' + formatTime(state.expiresAt);
    } else {
      tokenExpireInfoEl.textContent = '会话状态：未登录';
    }
  }

  async function apiRequest(url, options = {}) {
    const headers = { 'Content-Type': 'application/json', ...(options.headers || {}) };
    if (state.accessToken) {
      headers.Authorization = 'Bearer ' + state.accessToken;
    }

    const response = await fetch(url, { ...options, headers });
    if (!response.ok) {
      let error = '请求失败';
      try {
        const data = await response.json();
        error = data.error || error;
      } catch (ignored) {
      }

      if (response.status === 401) {
        clearAuthState();
        showLoginView();
        setLoginStatus('登录已过期，请重新登录。', true);
      }
      throw new Error(error);
    }

    if (response.status === 204) {
      return {};
    }
    return response.json();
  }

  async function login(username, password) {
    const response = await fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password })
    });

    if (!response.ok) {
      let error = '登录失败';
      try {
        const data = await response.json();
        error = data.error || error;
      } catch (ignored) {
      }
      throw new Error(error);
    }

    return response.json();
  }

  function showLoginView() {
    appViewEl.classList.add('hidden');
    loginViewEl.classList.remove('hidden');
    setGlobalStatus('');
  }

  function showAppView() {
    loginViewEl.classList.add('hidden');
    appViewEl.classList.remove('hidden');
  }

  function totalPages(total, pageSize) {
    return Math.max(1, Math.ceil(total / pageSize));
  }

  function clampPage(page, maxPage) {
    if (page < 1) {
      return 1;
    }
    if (page > maxPage) {
      return maxPage;
    }
    return page;
  }

  function slicePage(items, page, pageSize) {
    const start = (page - 1) * pageSize;
    return items.slice(start, start + pageSize);
  }

  function renderOverview() {
    const disabledCount = state.tokens.filter(token => token.disabled).length;
    document.getElementById('overviewOnlineCount').textContent = String(state.players.length);
    document.getElementById('overviewTokenCount').textContent = String(state.tokens.length);
    document.getElementById('overviewDisabledCount').textContent = String(disabledCount);
  }

  function renderPlayers() {
    const playersCountEl = document.getElementById('playersCount');
    const playersWrapEl = document.getElementById('playersWrap');
    const playersPageInfoEl = document.getElementById('playersPageInfo');
    const playersPrevBtnEl = document.getElementById('playersPrevBtn');
    const playersNextBtnEl = document.getElementById('playersNextBtn');

    const maxPage = totalPages(state.players.length, state.playersPageSize);
    state.playersPage = clampPage(state.playersPage, maxPage);

    playersCountEl.textContent = '共 ' + state.players.length + ' 人';
    playersPageInfoEl.textContent = '第 ' + state.playersPage + ' / ' + maxPage + ' 页';
    playersPrevBtnEl.disabled = state.playersPage <= 1;
    playersNextBtnEl.disabled = state.playersPage >= maxPage;

    if (!state.players.length) {
      playersWrapEl.innerHTML = '<p class="empty">当前没有在线玩家。</p>';
      return;
    }

    const players = slicePage(state.players, state.playersPage, state.playersPageSize);
    const rows = players.map(player => {
      const loginTag = player.loggedIn
        ? '<span class="tag active">已登录</span>'
        : '<span class="tag disabled">未登录</span>';

      return '<tr>'
        + '<td>' + escapeHtml(player.name || '-') + '</td>'
        + '<td><span class="mono">' + escapeHtml(player.uuid || '-') + '</span></td>'
        + '<td>' + loginTag + '</td>'
        + '<td><span class="mono">' + escapeHtml(player.boundToken || '-') + '</span></td>'
        + '</tr>';
    }).join('');

    playersWrapEl.innerHTML = '<table>'
      + '<thead><tr>'
      + '<th>玩家名</th><th>UUID</th><th>登录状态</th><th>绑定 Token</th>'
      + '</tr></thead>'
      + '<tbody>' + rows + '</tbody>'
      + '</table>';
  }

  function renderTokens() {
    const tokensCountEl = document.getElementById('tokensCount');
    const tokensWrapEl = document.getElementById('tokensWrap');
    const tokensPageInfoEl = document.getElementById('tokensPageInfo');
    const tokensPrevBtnEl = document.getElementById('tokensPrevBtn');
    const tokensNextBtnEl = document.getElementById('tokensNextBtn');

    const maxPage = totalPages(state.tokens.length, state.tokensPageSize);
    state.tokensPage = clampPage(state.tokensPage, maxPage);

    if (!state.generatedTokens.length) {
      generatedTokensEl.innerHTML = '';
    } else {
      generatedTokensEl.innerHTML = state.generatedTokens
        .map(token => '<span class="chip">' + escapeHtml(token) + '</span>')
        .join('');
    }

    tokensCountEl.textContent = '共 ' + state.tokens.length + ' 条';
    tokensPageInfoEl.textContent = '第 ' + state.tokensPage + ' / ' + maxPage + ' 页';
    tokensPrevBtnEl.disabled = state.tokensPage <= 1;
    tokensNextBtnEl.disabled = state.tokensPage >= maxPage;

    if (!state.tokens.length) {
      tokensWrapEl.innerHTML = '<p class="empty">当前没有 Token。</p>';
      return;
    }

    const tokens = slicePage(state.tokens, state.tokensPage, state.tokensPageSize);
    const rows = tokens.map(token => {
      const statusTag = token.disabled
        ? '<span class="tag disabled">已禁用</span>'
        : '<span class="tag active">可用</span>';
      const toggleAction = token.disabled ? 'enable' : 'disable';
      const toggleLabel = token.disabled ? '解除禁用' : '禁用';
      const encodedToken = encodeURIComponent(token.token);

      return '<tr>'
        + '<td><span class="mono">' + escapeHtml(token.token) + '</span></td>'
        + '<td><span class="mono">' + escapeHtml(token.boundUuid || '-') + '</span></td>'
        + '<td>' + escapeHtml(token.boundPlayerName || '-') + '</td>'
        + '<td>' + statusTag + '</td>'
        + '<td>' + escapeHtml(formatTime(token.createdAt)) + '</td>'
        + '<td>' + escapeHtml(formatTime(token.lastUsedAt)) + '</td>'
        + '<td>'
        + '<div class="actions">'
        + '<button class="ghost" data-action="' + toggleAction + '" data-token="' + encodedToken + '">' + toggleLabel + '</button>'
        + '<button class="danger" data-action="delete" data-token="' + encodedToken + '">删除</button>'
        + '</div>'
        + '</td>'
        + '</tr>';
    }).join('');

    tokensWrapEl.innerHTML = '<table>'
      + '<thead><tr>'
      + '<th>Token</th><th>绑定 UUID</th><th>玩家名</th><th>状态</th><th>创建时间</th><th>最近使用</th><th>操作</th>'
      + '</tr></thead>'
      + '<tbody>' + rows + '</tbody>'
      + '</table>';
  }

  function formatDuration(durationMillis) {
    if (!durationMillis || durationMillis < 0) {
      return '-';
    }

    const totalSeconds = Math.floor(durationMillis / 1000);
    const hours = Math.floor(totalSeconds / 3600);
    const minutes = Math.floor((totalSeconds % 3600) / 60);
    const seconds = totalSeconds % 60;
    return String(hours).padStart(2, '0') + ':' + String(minutes).padStart(2, '0') + ':' + String(seconds).padStart(2, '0');
  }

  function renderServerControl() {
    const status = state.serverStatus;
    const runningValueEl = document.getElementById('serverRunningValue');
    const loadValueEl = document.getElementById('serverLoadValue');
    const stopMsgValueEl = document.getElementById('serverStopMsgValue');
    const uptimeInfoEl = document.getElementById('serverUptimeInfo');
    const logLinesEl = document.getElementById('serverLogLines');

    if (!status || !status.available) {
      runningValueEl.textContent = '离线';
      loadValueEl.textContent = '-';
      stopMsgValueEl.textContent = '未知';
      uptimeInfoEl.textContent = '运行时长：-';
    } else {
      runningValueEl.textContent = status.running ? '运行中' : '停止中';
      loadValueEl.textContent = String(status.onlinePlayers || 0) + ' / ' + String(status.maxPlayers || 0);
      stopMsgValueEl.textContent = status.stopMsgAvailable ? '可用' : '未安装';
      uptimeInfoEl.textContent = '运行时长：' + formatDuration(status.uptimeMillis || 0);
    }

    if (!state.serverLogs.length) {
      logLinesEl.textContent = '暂无日志数据。';
    } else {
      logLinesEl.textContent = state.serverLogs.join('\n');
    }

    if (state.currentPage === 'server') {
      // Keep the latest log lines visible during polling updates.
      logLinesEl.scrollTop = logLinesEl.scrollHeight;
    }
  }

  function updateLastRefresh() {
    lastRefreshInfoEl.textContent = '上次刷新：' + formatTime(Date.now());
  }

  function renderAll() {
    renderOverview();
    renderPlayers();
    renderTokens();
    renderServerControl();
  }

  async function loadPlayers() {
    const data = await apiRequest('/api/players');
    state.players = Array.isArray(data.players) ? data.players : [];
  }

  async function loadTokens() {
    const data = await apiRequest('/api/tokens');
    state.tokens = Array.isArray(data.tokens) ? data.tokens : [];
  }

  async function loadServerStatus() {
    const data = await apiRequest('/api/server/status');
    state.serverStatus = data || null;
  }

  async function loadServerLogs() {
    const data = await apiRequest('/api/server/logs?limit=' + encodeURIComponent(String(state.serverLogLimit)));
    state.serverLogs = Array.isArray(data.lines) ? data.lines : [];
  }

  async function refreshData(showSuccess) {
    if (!hasUsableAccessToken()) {
      return;
    }
    if (state.refreshInFlight) {
      return;
    }

    state.refreshInFlight = true;
    try {
      const tasks = [loadPlayers(), loadTokens(), loadServerStatus()];
      if (state.currentPage === 'server') {
        tasks.push(loadServerLogs());
      }
      await Promise.all(tasks);
      renderAll();
      updateLastRefresh();
      if (showSuccess) {
        setGlobalStatus('数据已刷新。');
      }
    } catch (error) {
      setGlobalStatus(error.message, true);
    } finally {
      state.refreshInFlight = false;
      updateSessionMeta();
    }
  }

  function stopPolling() {
    if (state.pollTimer) {
      window.clearInterval(state.pollTimer);
      state.pollTimer = null;
    }
  }

  function startPolling() {
    stopPolling();
    state.pollTimer = window.setInterval(() => {
      refreshData(false);
    }, POLL_INTERVAL_MS);
  }

  async function ensureSessionAlive() {
    try {
      const data = await apiRequest('/api/auth/session');
      const expiresAt = Number.parseInt(String(data.expiresAt || 0), 10);
      saveAuthState(state.accessToken, Number.isFinite(expiresAt) ? expiresAt : state.expiresAt);
      return true;
    } catch (error) {
      return false;
    }
  }

  async function handleLoginClick() {
    const username = document.getElementById('loginUsername').value.trim();
    const password = document.getElementById('loginPassword').value;

    if (!username || !password) {
      setLoginStatus('请输入用户名和密码。', true);
      return;
    }

    const loginBtn = document.getElementById('loginBtn');
    loginBtn.disabled = true;
    try {
      const data = await login(username, password);
      const expiresAt = Number.parseInt(String(data.expiresAt || 0), 10);
      saveAuthState(data.accessToken || '', Number.isFinite(expiresAt) ? expiresAt : 0);

      if (!hasUsableAccessToken()) {
        throw new Error('登录返回的会话无效');
      }

      showAppView();
      setGlobalStatus('登录成功。');
      setLoginStatus('');
      await refreshData(false);
      startPolling();
    } catch (error) {
      setLoginStatus(error.message, true);
    } finally {
      loginBtn.disabled = false;
    }
  }

  async function handleLogout() {
    try {
      await apiRequest('/api/auth/logout', { method: 'POST' });
    } catch (error) {
      // Ignore server-side logout error and clear client state.
    }
    clearAuthState();
    showLoginView();
    setLoginStatus('已退出登录。');
  }

  function activatePage(page) {
    state.currentPage = page;

    const pageTitles = {
      overview: '概览',
      players: '在线玩家',
      tokens: 'Token 管理',
      server: '服务器控制'
    };

    document.getElementById('pageTitle').textContent = pageTitles[page] || pageTitles.overview;
    document.getElementById('tokenTitleGenerate').classList.toggle('hidden', page !== 'tokens');

    document.querySelectorAll('.menu-btn').forEach(btn => {
      btn.classList.toggle('active', btn.dataset.page === page);
    });

    document.querySelectorAll('.page').forEach(section => {
      section.classList.toggle('hidden', section.id !== 'page-' + page);
    });
  }

  async function handleGenerateTokens() {
    if (state.generateInFlight) {
      return;
    }

    const count = Number.parseInt(document.getElementById('generateCount').value, 10);
    if (!Number.isInteger(count) || count < 1 || count > MAX_BATCH_COUNT) {
      setGlobalStatus('数量必须是 1 到 ' + MAX_BATCH_COUNT + ' 的整数。', true);
      return;
    }

    const generateBtn = document.getElementById('generateBtn');
    state.generateInFlight = true;
    generateBtn.disabled = true;

    try {
      const data = await apiRequest('/api/tokens/generate', {
        method: 'POST',
        body: JSON.stringify({ count })
      });
      state.generatedTokens = Array.isArray(data.tokens) ? data.tokens : [];
      renderTokens();
      setGlobalStatus('成功生成 ' + (data.count || 0) + ' 个 Token。');
      await refreshData(false);
    } catch (error) {
      setGlobalStatus(error.message, true);
    } finally {
      state.generateInFlight = false;
      generateBtn.disabled = false;
    }
  }

  async function refreshServerLogs(showStatus) {
    try {
      await loadServerLogs();
      renderServerControl();
      if (showStatus) {
        setGlobalStatus('日志已刷新。');
      }
    } catch (error) {
      setGlobalStatus(error.message, true);
    }
  }

  async function handleExecuteServerCommand() {
    if (state.serverCommandInFlight) {
      return;
    }

    const commandInputEl = document.getElementById('serverCommandInput');
    const command = commandInputEl.value.trim();
    if (!command) {
      setGlobalStatus('请输入要执行的控制台指令。', true);
      return;
    }

    const commandBtn = document.getElementById('serverCommandBtn');
    const commandResultEl = document.getElementById('serverCommandResult');
    state.serverCommandInFlight = true;
    commandBtn.disabled = true;

    try {
      const data = await apiRequest('/api/server/command', {
        method: 'POST',
        body: JSON.stringify({ command })
      });
      commandResultEl.textContent = '已提交指令：' + (data.command || command);
      setGlobalStatus('控制台指令已执行。');
      await refreshData(false);
    } catch (error) {
      setGlobalStatus(error.message, true);
    } finally {
      state.serverCommandInFlight = false;
      commandBtn.disabled = false;
    }
  }

  async function handleShutdownServer() {
    if (state.shutdownInFlight) {
      return;
    }

    if (!window.confirm('确认关闭服务器吗？此操作不可撤销。')) {
      return;
    }

    const shutdownBtn = document.getElementById('shutdownBtn');
    const shutdownMessage = document.getElementById('shutdownMessageInput').value.trim();
    state.shutdownInFlight = true;
    shutdownBtn.disabled = true;

    try {
      const data = await apiRequest('/api/server/shutdown', {
        method: 'POST',
        body: JSON.stringify({ message: shutdownMessage })
      });
      if (data.stopMsgUsed) {
        setGlobalStatus('关服请求已提交，并通过 StopMsgMod 发送通知。');
      } else if (shutdownMessage) {
        setGlobalStatus('关服请求已提交，StopMsgMod 不可用，已回退为普通广播。');
      } else {
        setGlobalStatus('关服请求已提交。');
      }
    } catch (error) {
      setGlobalStatus(error.message, true);
    } finally {
      state.shutdownInFlight = false;
      shutdownBtn.disabled = false;
    }
  }

  async function disableToken(encodedToken) {
    try {
      await apiRequest('/api/tokens/' + encodedToken + '/disable', { method: 'PATCH' });
      setGlobalStatus('Token 已禁用。');
      await refreshData(false);
    } catch (error) {
      setGlobalStatus(error.message, true);
    }
  }

  async function enableToken(encodedToken) {
    try {
      await apiRequest('/api/tokens/' + encodedToken + '/enable', { method: 'PATCH' });
      setGlobalStatus('Token 已解除禁用。');
      await refreshData(false);
    } catch (error) {
      setGlobalStatus(error.message, true);
    }
  }

  async function deleteToken(encodedToken) {
    try {
      await apiRequest('/api/tokens/' + encodedToken, { method: 'DELETE' });
      setGlobalStatus('Token 已删除。');
      await refreshData(false);
    } catch (error) {
      setGlobalStatus(error.message, true);
    }
  }

  function bindEvents() {
    document.getElementById('loginBtn').addEventListener('click', handleLoginClick);
    document.getElementById('loginPassword').addEventListener('keydown', event => {
      if (event.key === 'Enter') {
        event.preventDefault();
        handleLoginClick();
      }
    });

    document.getElementById('logoutBtn').addEventListener('click', handleLogout);
    document.getElementById('refreshNowBtn').addEventListener('click', () => refreshData(true));
    document.getElementById('generateBtn').addEventListener('click', handleGenerateTokens);
    document.getElementById('serverCommandBtn').addEventListener('click', handleExecuteServerCommand);
    document.getElementById('shutdownBtn').addEventListener('click', handleShutdownServer);
    document.getElementById('refreshLogsBtn').addEventListener('click', () => refreshServerLogs(true));
    document.getElementById('serverLogLimit').addEventListener('change', event => {
      state.serverLogLimit = Number.parseInt(event.target.value, 10) || 200;
      refreshServerLogs(false);
    });
    document.getElementById('serverCommandInput').addEventListener('keydown', event => {
      if (event.key === 'Enter') {
        event.preventDefault();
        handleExecuteServerCommand();
      }
    });

    document.querySelectorAll('.menu-btn').forEach(button => {
      button.addEventListener('click', async () => {
        const page = button.dataset.page || 'overview';
        activatePage(page);
        if (page === 'server') {
          await refreshServerLogs(false);
        }
      });
    });

    document.getElementById('playersPrevBtn').addEventListener('click', () => {
      state.playersPage = Math.max(1, state.playersPage - 1);
      renderPlayers();
    });
    document.getElementById('playersNextBtn').addEventListener('click', () => {
      state.playersPage = state.playersPage + 1;
      renderPlayers();
    });
    document.getElementById('playersPageSize').addEventListener('change', event => {
      state.playersPageSize = Number.parseInt(event.target.value, 10) || 20;
      state.playersPage = 1;
      renderPlayers();
    });

    document.getElementById('tokensPrevBtn').addEventListener('click', () => {
      state.tokensPage = Math.max(1, state.tokensPage - 1);
      renderTokens();
    });
    document.getElementById('tokensNextBtn').addEventListener('click', () => {
      state.tokensPage = state.tokensPage + 1;
      renderTokens();
    });
    document.getElementById('tokensPageSize').addEventListener('change', event => {
      state.tokensPageSize = Number.parseInt(event.target.value, 10) || 20;
      state.tokensPage = 1;
      renderTokens();
    });

    document.getElementById('tokensWrap').addEventListener('click', async event => {
      const target = event.target;
      if (!(target instanceof HTMLButtonElement)) {
        return;
      }
      const action = target.dataset.action;
      const token = target.dataset.token;
      if (!action || !token) {
        return;
      }

      target.disabled = true;
      try {
        if (action === 'disable') {
          await disableToken(token);
          return;
        }
        if (action === 'enable') {
          await enableToken(token);
          return;
        }
        if (action === 'delete') {
          await deleteToken(token);
        }
      } finally {
        target.disabled = false;
      }
    });
  }

  async function bootstrap() {
    bindEvents();
    restoreAuthState();

    if (!hasUsableAccessToken()) {
      showLoginView();
      return;
    }

    const alive = await ensureSessionAlive();
    if (!alive) {
      clearAuthState();
      showLoginView();
      return;
    }

    showAppView();
    await refreshData(false);
    startPolling();
  }

  bootstrap();
</script>
</body>
</html>
